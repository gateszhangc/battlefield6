name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: battlefield6-release
  cancel-in-progress: true

env:
  APP_NAME: battlefield6
  BUILD_NAMESPACE: webapp-build
  K8S_BUILD_SERVICE_ACCOUNT: kaniko-builder
  K8S_DOCKER_CONFIG_SECRET: webapp-registry-push
  K8S_JOB_TTL_SECONDS: "600"
  IMAGE_REPOSITORY: registry.144.91.77.245.sslip.io/battlefield6
  KUSTOMIZATION_FILE: deploy/k8s/overlays/prod/kustomization.yaml
  BUILD_JOB_TEMPLATE: .github/manifests/k8s-image-build-job.yaml
  DOCKERFILE_PATH: Dockerfile

jobs:
  test:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm test

  build-release-and-sync:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release metadata
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_job_name=${APP_NAME}-image-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA || secrets.KUBECONFIG_B64 }}
        run: |
          test -n "$KUBE_CONFIG_DATA"
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG_DATA" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Render image build job
        run: |
          python3 scripts/render_k8s_build_job.py \
            --template "$BUILD_JOB_TEMPLATE" \
            --output /tmp/image-build-job.yaml \
            --job-name "${{ steps.meta.outputs.build_job_name }}" \
            --namespace "$BUILD_NAMESPACE" \
            --app-name "$APP_NAME" \
            --build-service-account "$K8S_BUILD_SERVICE_ACCOUNT" \
            --docker-config-secret "$K8S_DOCKER_CONFIG_SECRET" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --image-name "$IMAGE_REPOSITORY" \
            --image-tag "${{ steps.meta.outputs.image_tag }}" \
            --cache-repo "${IMAGE_REPOSITORY}-cache" \
            --dockerfile-path "$DOCKERFILE_PATH" \
            --job-ttl-seconds "$K8S_JOB_TTL_SECONDS"
          cat /tmp/image-build-job.yaml

      - name: Run K8s build job
        run: |
          kubectl -n "$BUILD_NAMESPACE" delete job "${{ steps.meta.outputs.build_job_name }}" --ignore-not-found
          kubectl apply -f /tmp/image-build-job.yaml
          if ! kubectl -n "$BUILD_NAMESPACE" wait --for=condition=Complete --timeout=45m "job/${{ steps.meta.outputs.build_job_name }}"; then
            kubectl -n "$BUILD_NAMESPACE" describe "job/${{ steps.meta.outputs.build_job_name }}" || true
            kubectl -n "$BUILD_NAMESPACE" logs "job/${{ steps.meta.outputs.build_job_name }}" --all-containers=true || true
            exit 1
          fi
          kubectl -n "$BUILD_NAMESPACE" logs "job/${{ steps.meta.outputs.build_job_name }}" --all-containers=true

      - name: Rebase release workspace onto latest main
        run: |
          git fetch origin main
          git checkout -B release-sync origin/main

      - name: Update kustomize image tag
        run: |
          python3 scripts/sync_kustomize_image_tag.py \
            --file "$KUSTOMIZATION_FILE" \
            --image "$APP_NAME" \
            --new-tag "${{ steps.meta.outputs.image_tag }}"

      - name: Commit and push release manifest
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUSTOMIZATION_FILE"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: release battlefield6 ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main

      - name: Clean up build job
        if: always()
        run: |
          kubectl -n "$BUILD_NAMESPACE" delete job "${{ steps.meta.outputs.build_job_name }}" --ignore-not-found
