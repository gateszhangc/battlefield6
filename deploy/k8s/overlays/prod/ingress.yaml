apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: battlefield6
  annotations:
    acme.cert-manager.io/http01-edit-in-place: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: battlefield6-live-tls
      hosts:
        - battlefield6.lol
  rules:
    - host: battlefield6.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: battlefield6
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: battlefield6-www-redirect
  annotations:
    acme.cert-manager.io/http01-edit-in-place: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: https://battlefield6.lol$request_uri
    nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: battlefield6-www-tls
      hosts:
        - www.battlefield6.lol
  rules:
    - host: www.battlefield6.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: battlefield6
                port:
                  number: 80
